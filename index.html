<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Przeroboofka</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

        <circle fill="none" stroke="#16a34a" stroke-width="2" cx="340" cy="120" r="14" opacity="0.8"/>

        <circle fill="none" stroke="#86efac" stroke-width="2" cx="330" cy="65" r="3.5" opacity="0.45"/>
        <circle fill="none" stroke="#22c55e" stroke-width="2" cx="355" cy="55" r="2.5" opacity="0.4"/>
        <circle fill="none" stroke="#4ade80" stroke-width="2" cx="318" cy="52" r="2" opacity="0.35"/>
        <circle cx="307" cy="145" r="2.5" fill="#dcfce7" opacity="0.8"/>
        <circle cx="367" cy="135" r="2" fill="#dcfce7" opacity="0.8"/>
        <circle cx="336" cy="116" r="3" fill="#dcfce7" opacity="0.7"/>
    </svg>
        <div class="splash-title">Przerobo<span>ofka</span></div>
        <div class="splash-by">by Mieszko</div>
        <div class="splash-spinner"><div class="spinner"></div></div>
        <div class="splash-text">Ładowanie receptur...</div>
    </div>
</div>

<div class="container" id="app" style="display:none">

    <!-- HEADER -->
    <header class="app-header">
        <svg class="header-logo-svg" viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg">
        <line x1="292" y1="248" x2="278" y2="278" stroke="#8a9099" stroke-width="5" stroke-linecap="round"/>
        <line x1="388" y1="248" x2="402" y2="278" stroke="#8a9099" stroke-width="5" stroke-linecap="round"/>
        <line x1="340" y1="252" x2="340" y2="278" stroke="#8a9099" stroke-width="5" stroke-linecap="round"/>
        <path d="M 240 180 Q 238 250 300 258 L 380 258 Q 442 250 440 180 Z" fill="#c8cdd6" stroke="#9aa0ac" stroke-width="2"/>
        <path d="M 255 195 Q 253 242 305 250 L 350 250 Q 290 248 288 195 Z" fill="#dde1e8" stroke="none" opacity="0.6"/>
        <ellipse cx="340" cy="180" rx="100" ry="22" fill="#b0b8c4" stroke="#8a9099" stroke-width="2"/>
        <ellipse cx="340" cy="180" rx="100" ry="22" fill="none" stroke="#dde1e8" stroke-width="1" opacity="0.7"/>
        <ellipse cx="340" cy="180" rx="92" ry="17" fill="#16a34a" opacity="0.85"/>
        <ellipse cx="340" cy="180" rx="92" ry="17" fill="none" stroke="#22c55e" stroke-width="1.5" opacity="0.5"/>
        <ellipse cx="315" cy="177" rx="28" ry="6" fill="#86efac" opacity="0.35"/>
        <path d="M 242 195 Q 210 195 210 215 Q 210 235 242 232" fill="none" stroke="#9aa0ac" stroke-width="6" stroke-linecap="round"/>
        <path d="M 438 195 Q 470 195 470 215 Q 470 235 438 232" fill="none" stroke="#9aa0ac" stroke-width="6" stroke-linecap="round"/>
        <circle fill="none" stroke="#16a34a" stroke-width="2" cx="310" cy="148" r="11" opacity="0.9"/>
        <circle fill="none" stroke="#22c55e" stroke-width="2" cx="370" cy="138" r="9" opacity="0.85"/>
        <circle fill="none" stroke="#16a34a" stroke-width="2" cx="340" cy="120" r="14" opacity="0.8"/>
        <circle fill="none" stroke="#4ade80" stroke-width="2" cx="295" cy="118" r="7" opacity="0.7"/>
        <circle fill="none" stroke="#16a34a" stroke-width="2" cx="358" cy="105" r="8" opacity="0.75"/>
        <circle fill="none" stroke="#22c55e" stroke-width="2" cx="325" cy="95" r="6" opacity="0.65"/>
        <circle fill="none" stroke="#86efac" stroke-width="2" cx="350" cy="80" r="4" opacity="0.6"/>
        <circle fill="none" stroke="#4ade80" stroke-width="2" cx="312" cy="82" r="3" opacity="0.55"/>
        <circle fill="none" stroke="#16a34a" stroke-width="2" cx="370" cy="72" r="5" opacity="0.5"/>
        <circle fill="none" stroke="#86efac" stroke-width="2" cx="330" cy="65" r="3.5" opacity="0.45"/>
        <circle fill="none" stroke="#22c55e" stroke-width="2" cx="355" cy="55" r="2.5" opacity="0.4"/>
        <circle fill="none" stroke="#4ade80" stroke-width="2" cx="318" cy="52" r="2" opacity="0.35"/>
        <circle cx="307" cy="145" r="2.5" fill="#dcfce7" opacity="0.8"/>
        <circle cx="367" cy="135" r="2" fill="#dcfce7" opacity="0.8"/>
        <circle cx="336" cy="116" r="3" fill="#dcfce7" opacity="0.7"/>
    </svg>
        <div class="header-text">
            <h1>Przerobo<span>ofka</span></h1>
            <div class="header-by">by Mieszko</div>
        </div>
    </header>

    <!-- MENU -->
    <div class="menu">
        <button onclick="pokazWidok('kalkulator')">
            <span class="menu-icon">⚖️</span>
            <span>Kalkulator</span>
        </button>
        <button onclick="pokazWidok('edytor')">
            <span class="menu-icon">✏️</span>
            <span>Edytor</span>
        </button>
        <button onclick="pokazWidok('nowa')">
            <span class="menu-icon">➕</span>
            <span>Nowa</span>
        </button>
        <button onclick="pokazWidok('skan')">
            <span class="menu-icon">📷</span>
            <span>Skan</span>
        </button>
    </div>

    <!-- ========================= WIDOK: KALKULATOR ========================== -->
    <div id="widok-kalkulator" class="widok">
        <div class="widok-title">Przelicznik</div>

        <label class="field-label">Receptura</label>
        <div class="select-wrap">
            <select id="produkt" onchange="zmienProdukt('kalkulator')"></select>
        </div>

        <label class="field-label">Docelowa masa (kg)</label>
        <input type="number" id="iloscKg" placeholder="np. 35" oninput="przelicz()">

        <div id="wynik"></div>
        <div id="procesWidok"></div>
    </div>

    <!-- ========================= WIDOK: EDYTOR ========================== -->
    <div id="widok-edytor" class="widok hidden">
        <div class="widok-title">Edytor receptury</div>

        <label class="field-label">Receptura</label>
        <div class="select-wrap">
            <select id="produktEdytor" onchange="zmienProdukt('edytor')"></select>
        </div>

        <div id="edytor"></div>
        <div id="sumaReceptury"></div>

        <!-- Dodaj składnik -->
        <div class="add-section">
            <div class="add-section-title">Dodaj składnik</div>
            <div class="add-row">
                <input type="text" id="edytorNowySkladnik" placeholder="Nazwa składnika">
                <input type="number" id="edytorNowaIlosc" placeholder="Ilość">
            </div>
            <button onclick="dodajSkladnikEdytor()" class="btn-primary btn-full">+ Dodaj składnik</button>
        </div>

        <!-- Proces -->
        <div class="add-section">
            <div class="add-section-title">Proces wytwarzania</div>
            <textarea id="edytorProces" placeholder="Wpisz proces wytwarzania..." rows="5"></textarea>
        </div>

        <!-- Notatki -->
        <div class="add-section">
            <div class="add-section-title">Notatki operatora</div>
            <div id="listaNotatek"></div>
            <div class="add-row" style="margin-top:10px">
                <input type="text" id="nowaNotatka" placeholder="Dodaj notatkę...">
                <button onclick="dodajNotatke()" class="btn-primary btn-icon">+</button>
            </div>
        </div>

        <!-- Akcje receptury -->
        <div class="add-section">
            <div class="add-section-title">Akcje</div>
            <div class="button-group">
                <button onclick="zapiszRecepture()" class="btn-primary btn-full">💾 Zapisz zmiany</button>
                <button onclick="zapiszJakoBazowa()" class="btn-base">📌 Zapisz jako bazową</button>
                <button onclick="przywrocRecepture()" class="btn-warning">↩️ Przywróć do bazowej</button>
                <button onclick="usunRecepture()" class="btn-danger">🗑️ Usuń recepturę</button>
            </div>
        </div>
    </div>

    <!-- ========================= WIDOK: NOWA RECEPTURA ========================== -->
    <div id="widok-nowa" class="widok hidden">
        <div class="widok-title">Nowa receptura</div>

        <label class="field-label">Nazwa receptury</label>
        <input type="text" id="nowaReceptura" placeholder="np. Szampon Lawendowy">
        <button onclick="dodajRecepture()" class="btn-primary btn-full">✅ Utwórz recepturę</button>

        <div id="podgladNowejReceptury"></div>
        <div id="sumaNowejReceptury"></div>

        <div class="add-section">
            <div class="add-section-title">Dodaj składnik</div>
            <div class="add-row">
                <input type="text" id="nowySkladnik" placeholder="Nazwa składnika">
                <input type="number" id="nowaIlosc" placeholder="Ilość">
            </div>
            <button onclick="dodajSkladnikNowejReceptury()" class="btn-primary btn-full">+ Dodaj składnik</button>
        </div>

        <div class="add-section">
            <div class="add-section-title">Proces wytwarzania</div>
            <textarea id="nowyProces" placeholder="Wpisz proces wytwarzania..." rows="5"></textarea>
        </div>
    </div>

    <!-- ========================= WIDOK: SKAN ========================== -->
    <div id="widok-skan" class="widok hidden">
        <div class="widok-title">Skan receptury</div>

        <div class="scan-drop-zone" id="scanDropZone">
            <div class="scan-icon">📷</div>
            <div class="scan-label">Zrób zdjęcie lub wgraj plik</div>
            <div class="scan-sub">JPG, PNG — maks. 5MB</div>
            <input type="file" id="scanInput" accept="image/*" capture="environment" style="display:none"
                onchange="podgladZdjecia(event)">
        </div>

        <!-- Dwa przyciski — zdjęcie z aparatu i upload z galerii -->
        <div class="scan-buttons">
            <button class="btn-primary btn-scan"
                onclick="document.getElementById('scanInput').removeAttribute('capture'); document.getElementById('scanInput').click()">
                🖼️ Wgraj z galerii
            </button>
            <button class="btn-base btn-scan"
                onclick="document.getElementById('scanInput').setAttribute('capture','environment'); document.getElementById('scanInput').click()">
                📷 Zrób zdjęcie
            </button>
        </div>

        <div id="scanStatus"></div>
        <div id="scanPodglad"></div>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
